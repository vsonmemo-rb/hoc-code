<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Buổi 7 — Máy tính lãi tiết kiệm</title>

  <style>
    body {
      margin: 0; padding: 30px 18px 60px;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: #eef4fb;
      color: #23364d;
      display: flex; flex-direction: column; align-items: center;
    }
    .the {
      background: #fff; width: 100%; max-width: 480px;
      border-radius: 18px; padding: 28px 26px;
      box-shadow: 0 10px 30px rgba(20,60,110,.12);
      margin-bottom: 20px;
    }
    h1 { font-size: 23px; margin: 0 0 6px; }
    .phu { color: #7a8ea3; font-size: 14px; margin: 0 0 24px; }

    label { display: block; font-size: 13px; font-weight: 600; margin: 16px 0 6px; }
    input {
      width: 100%; padding: 12px 14px; font-size: 16px;
      border: 2px solid #d7e3f0; border-radius: 10px;
      font-family: inherit; color: #23364d;
    }
    input:focus { outline: none; border-color: #2f7fd4; }

    button {
      width: 100%; margin-top: 22px; padding: 15px;
      font-family: inherit; font-size: 16px; font-weight: 600;
      color: #fff; background: #2f7fd4;
      border: none; border-radius: 999px; cursor: pointer;
    }
    button:hover { background: #1f66b5; }

    .ketQua { background: #f4f9ff; border-radius: 14px; padding: 20px; margin-top: 22px; }
    .dong {
      display: flex; justify-content: space-between;
      padding: 9px 0; border-bottom: 1px dashed #d7e3f0; font-size: 15px;
    }
    .dong:last-child { border-bottom: none; font-weight: 700; font-size: 18px; color: #1f66b5; }
    .dong span:last-child { font-weight: 600; }

    .ghiChu { font-size: 13px; color: #7a8ea3; line-height: 1.6; }
    code {
      background: #eaf2fb; padding: 2px 7px; border-radius: 5px;
      font-size: 13px; color: #1f66b5;
    }
  </style>
</head>

<body>

  <div class="the">
    <h1>💰 Máy tính lãi tiết kiệm</h1>
    <p class="phu">Buổi 7 — thực hành biến & kiểu dữ liệu</p>

    <label for="oTienGoc">Số tiền gửi (VNĐ)</label>
    <input type="number" id="oTienGoc" value="100000000">

    <label for="oLaiSuat">Lãi suất một năm (%)</label>
    <input type="number" id="oLaiSuat" value="5.6" step="0.1">

    <label for="oSoNam">Gửi trong bao nhiêu năm</label>
    <input type="number" id="oSoNam" value="3">

    <button onclick="tinhLai()">Tính thử</button>

    <div class="ketQua" id="ketQua" style="display:none;">
      <div class="dong"><span>Tiền gốc</span>     <span id="rGoc"></span></div>
      <div class="dong"><span>Tiền lãi</span>     <span id="rLai"></span></div>
      <div class="dong"><span>Tổng nhận về</span> <span id="rTong"></span></div>
    </div>
  </div>

  <div class="the">
    <p class="ghiChu">
      <b>Thử nghịch:</b> đổi lãi suất từ <code>5.6</code> thành <code>7</code> rồi bấm Tính thử.
      Hoặc mở file <code>index.html</code>, tìm dòng <code>const soThangTrongNam = 12;</code>
      và đổi thành số khác — xem kết quả thay đổi thế nào.
    </p>
  </div>

  <script>
    /* ============================================================
       BUỔI 7 — BIẾN & KIỂU DỮ LIỆU
       Đọc phần này để thấy 4 kiểu dữ liệu ngoài đời thật
       ============================================================ */

    // ---------- BIẾN CỐ ĐỊNH (đặt sẵn, không đổi khi chạy) ----------

    const tenNganHang = "Ngân hàng ABC";   // KIỂU CHUỖI  — có dấu nháy
    const soThangTrongNam = 12;            // KIỂU SỐ     — không có nháy
    const tinhLaiKep = true;               // KIỂU ĐÚNG/SAI

    // KIỂU DANH SÁCH — nhiều giá trị xếp hàng trong dấu [ ]
    const cacKyHan = [1, 3, 6, 12, 24];

    function tinhLai() {
      // ---------- LẤY SỐ NGƯỜI DÙNG NHẬP ----------
      // Chú ý: ô nhập LUÔN trả về CHUỖI, kể cả khi bạn gõ số!
      // Nên phải đổi sang SỐ bằng Number(), nếu không sẽ cộng nhầm thành nối chữ.

      const tienGoc = Number(document.getElementById("oTienGoc").value);
      const laiSuat = Number(document.getElementById("oLaiSuat").value);
      const soNam   = Number(document.getElementById("oSoNam").value);

      // ---------- TÍNH TOÁN ----------
      // Lãi kép: tiền gốc nhân (1 + lãi suất) mũ số năm
      const tiLe = laiSuat / 100;                       // 5.6% -> 0.056
      const tongNhan = tienGoc * Math.pow(1 + tiLe, soNam);
      const tienLai = tongNhan - tienGoc;

      // ---------- HIỆN KẾT QUẢ ----------
      document.getElementById("rGoc").textContent  = dinhDang(tienGoc);
      document.getElementById("rLai").textContent  = dinhDang(tienLai);
      document.getElementById("rTong").textContent = dinhDang(tongNhan);
      document.getElementById("ketQua").style.display = "block";
    }

    // Biến số thành chữ có dấu chấm ngăn nghìn: 1000000 -> "1.000.000 đ"
    function dinhDang(so) {
      return Math.round(so).toLocaleString("vi-VN") + " đ";
    }

    // Tính sẵn một lần khi mở trang cho có kết quả xem luôn
    tinhLai();
  </script>

</body>
</html>
